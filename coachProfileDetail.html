<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<body class="bg-black">
    <header id="header" class="w-full overflow-hidden>
      <div class="header-container w-full">


        <section class="header-banner pt-4 bg-black mb-3">
          <div class="header-banner-container relative h-[30rem]">

            <img
              src="assets/image/bo-zhang-wIFI9f6eISs-unsplash.jpg"
              class="w-full h-full rounded-3xl absolute inset-0 object-cover"
              alt="banner"
            />

            <div class="banner-shadow absolute inset-0 rounded-3xl bg-gradient-to-t from-black/90 via-black/60 via-black/30 to-transparent"></div>


            <button class="bg-[#1C1C1E]/80 absolute p-3 rounded-full top-4 left-3 text-white font-bold">
                <i class="fa-solid fa-arrow-left"></i>
            </button>


            <div class="banner-text-container text-right absolute right-6 bottom-10 flex justify-between items-center w-[90%]">

                <div class="order-1">
                        <h3 class="text-white font-bold text-[1.8rem] mt-[.1rem] mb-[.4rem]">کاپیتان سهراب علوی</h3>

                </div>

                <div class="coach-score  text-[.9rem] bg-[#F5A623] rounded-3xl py-[.4rem] px-5 text-white mt-5"><i class="fa fa-star mr-1"></i>4.9</div>


            </div>



          </div>
        </section>


      </div>
